<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Artículos - La Santé</title>
  <link rel="stylesheet" href="assets/css/admin.css" />
  <meta name="api-base" content="/api" />
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <div class="brand" aria-hidden="false">
        <div class="brand-badge" aria-hidden="true"></div>
        <div>La Santé — Admin</div>
      </div>
      <div class="top-actions" role="navigation" aria-label="Acciones rápidas">
        <a class="btn" href="/admin/dashboard.html">Dashboard</a>
        <button id="btnLogout" class="btn danger">Salir</button>
      </div>
    </div>
  </header>

  <div class="layout" role="main">
    <aside class="sidebar" aria-label="Navegación">
      <div class="sidebar-inner">
        <div class="nav-title">Contenido</div>
        <nav class="nav" aria-label="Secciones">
          <a data-href="/admin/dashboard.html" href="/admin/dashboard.html">Dashboard <span aria-hidden="true">→</span></a>
          <a data-href="/admin/posts.html" href="/admin/posts.html" class="active">Artículos <span aria-hidden="true">→</span></a>
          <a data-href="/admin/banners.html" href="/admin/banners.html">Banners Home <span aria-hidden="true">→</span></a>
        </nav>
      </div>
    </aside>

    <main class="content" aria-label="Gestión de artículos">
      <div class="content-inner">
        <h1 class="h1">Artículos</h1>
        <p class="p">Crear, editar y borrar artículos (modo demo con localStorage; preparado para API).</p>

        <div class="toolbar" role="toolbar" aria-label="Herramientas">
          <button id="btnNew" class="btn primary" type="button">Nuevo artículo</button>
          <input id="q" class="input" style="max-width: 360px;" placeholder="Buscar por título o slug..." aria-label="Buscar artículos" />
        </div>

        <div class="grid" style="grid-template-columns: 1.2fr 1fr;">
          <div class="card" aria-live="polite">
            <h3>Listado</h3>
            <table class="table" aria-label="Listado de artículos">
              <thead>
                <tr>
                  <th>Título</th>
                  <th>Slug</th>
                  <th>Estado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>

          <div class="card" id="editorCard">
            <h3 id="editorTitle">Editor</h3>
            <form id="form" class="form" novalidate>
              <input type="hidden" id="id" />

              <div class="field">
                <label for="title">Título</label>
                <input id="title" class="input" required />
              </div>

              <div class="row">
                <div class="field">
                  <label for="slug">Slug</label>
                  <input id="slug" class="input" placeholder="ej: dolor-de-espalda" required />
                </div>
                <div class="field">
                  <label for="category">Categoría</label>
                  <input id="category" class="input" placeholder="Prevención / Medicina General..." />
                </div>
              </div>

              <div class="row">
                <div class="field">
                  <label for="status">Estado</label>
                  <select id="status" class="select">
                    <option value="draft">Draft</option>
                    <option value="published">Published</option>
                  </select>
                </div>
                <div class="field">
                  <label for="coverImage">Imagen portada (ruta)</label>
                  <input id="coverImage" class="input" placeholder="assets/img/blog/mi-imagen.jpg" />
                </div>
              </div>

              <div class="field">
                <label for="excerpt">Excerpt</label>
                <input id="excerpt" class="input" />
              </div>

              <div class="field">
                <label for="content">Contenido</label>
                <textarea id="content" class="textarea"></textarea>
              </div>

              <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn primary" type="submit">Guardar</button>
                <button id="btnReset" class="btn" type="button">Limpiar</button>
              </div>
            </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script type="module" src="./assets/js/admin.posts.js"></script>
</body>
</html>
