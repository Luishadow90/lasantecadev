<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | Login - La Santé</title>

  <!-- CSS principal del Admin -->
  <link rel="stylesheet" href="assets/css/admin.css" />

  <!-- API base para producción -->
  <meta name="api-base" content="/api" />
</head>

<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-badge" aria-hidden="true"></div>
        <div>La Santé — Admin</div>
      </div>
      <div class="top-actions">
        <a class="btn" href="/index.html">Volver al sitio</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="content" style="max-width: 520px; margin: 22px auto;">
      <div class="content-inner">
        <h1 class="h1">Iniciar sesión</h1>
        <p class="p">Acceso al panel administrativo.</p>

        <form id="loginForm" class="form" autocomplete="off">
          <div class="field">
            <label for="email" class="label">Email</label>
            <input id="email" class="input" type="email" placeholder="admin@lasante" required />
          </div>

          <div class="field">
            <label for="password" class="label">Password</label>
            <input id="password" class="input" type="password" placeholder="Admin123!" required />
          </div>

          <div class="actions">
            <button class="btn primary" type="submit">Entrar</button>
            <span id="msg" class="msg"></span>
          </div>

          <div class="card mt-2">
            <h3>Credenciales demo</h3>
            <p class="p">Usuario: <b>admin@lasante</b> · Password: <b>Admin123!</b></p>
          </div>
        </form>
      </div>
    </section>
  </main>

  <!-- JS del Admin -->
  <script type="module">
    import { loginDemo, ensureSeedData } from "./assets/js/admin.js";

    ensureSeedData();

    const form = document.getElementById("loginForm");
    const msg = document.getElementById("msg");
    const apiBase = document.querySelector('meta[name="api-base"]').content;

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      /* 
        1) Intento de login real vía API (producción)
        2) Si falla → fallback a loginDemo (modo local)
      */

      try {
        const res = await fetch(`${apiBase}/auth/login`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        if (res.ok) {
          const data = await res.json();
          localStorage.setItem("ls_token", data.token);
          window.location.href = "/admin/dashboard.html";
          return;
        }
      } catch (err) {
        console.warn("API no disponible, usando modo demo.");
      }

      // Fallback demo
      const demo = loginDemo(email, password);
      if (!demo.ok) {
        msg.textContent = demo.message;
        return;
      }

      window.location.href = "/admin/dashboard.html";
    });
  </script>
</body>
</html>
